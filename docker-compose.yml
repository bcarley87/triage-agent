services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: triage_agent
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage -d triage_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://triage:triage@db:5432/triage_agent
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn triage_agent.api.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
